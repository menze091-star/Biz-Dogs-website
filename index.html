<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizDogs — UMD Live & Learning Community</title>
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>

<header class="site-header">
  <nav class="nav container">
    <a href="#home" class="nav-brand">
      <span class="brand-biz">BIZ</span><span class="brand-dogs">DOGS</span>
      <span class="brand-umd">@ UMD</span>
    </a>

    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#events">Events</a></li>
      <li><a href="#join">Join Us</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

    <a href="#join" class="btn-primary nav-cta">Apply Now</a>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container hero-inner">

    <div class="hero-text">
      <span class="eyebrow">UMD Pre-Business • Lake Superior Hall</span>

      <h1 class="hero-title">
        Live. Learn.<br />
        <em>Lead.</em>
      </h1>

      <p class="hero-sub">
        BizDogs is UMD's first-year pre-business Live and Learning Community.
      </p>

      <div class="hero-actions">
        <a href="#join" class="btn-primary btn-lg">Join BizDogs →</a>
        <a href="#about" class="btn-ghost btn-lg">Learn More</a>
      </div>
    </div>

    <div class="hero-image-wrap">
      <div class="hero-img-frame">
        <img src="./images/group-photo.png" alt="BizDogs cohort group photo" class="hero-img" />
      </div>
    </div>

  </div>
</section>

<!-- ABOUT IMAGES FIXED -->
<section id="about">

  <img src="./images/networking-event.png" alt="Networking event" />
  <img src="./images/essentia-tour.png" alt="Site visit" />
  <img src="./images/chum-event.png" alt="Community service" />
  <img src="./images/team-building.png" alt="Team building" />
  <img src="./images/mba-collaboration.png" alt="MBA collaboration" />

</section>

<!-- COUNCIL IMAGES FIXED -->
<section>

  <img src="./images/president.png" alt="President" />
  <img src="./images/vice-president.png" alt="Vice President" />
  <img src="./images/treasurer.png" alt="Treasurer" />
  <img src="./images/secretary.png" alt="Secretary" />

</section>

<!-- EVENTS FIXED -->
<section>

  <img src="./images/chum-volunteers.png" alt="CHUM volunteers" />
  <img src="./images/networking-event.png" alt="Networking mixer" />
  <img src="./images/essentia-tour.png" alt="Essentia tour" />
  <img src="./images/team-building.png" alt="Team building event" />

</section>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const navLinks = document.querySelector('.nav-links');

  if (toggle) {
    toggle.addEventListener('click', () => {
      navLinks.classList.toggle('nav-links--open');
    });
  }
</script>

</body>
</html>
